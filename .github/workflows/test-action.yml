# Builds vens from main until a release ships the --llm=mock backend.
# Flip to a pinned tag once that lands.
name: Test action

on:
  pull_request:
    paths:
      - action.yml
      - testdata/**
      - .github/workflows/test-action.yml
  push:
    branches: [main]
    paths:
      - action.yml
      - testdata/**
      - .github/workflows/test-action.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: ${{ matrix.os }} · ${{ matrix.scanner.name }} ${{ matrix.scanner.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        scanner:
          - { name: trivy, version: v0.69.3 }
          - { name: trivy, version: v0.69.2 }
          - { name: grype, version: v0.111.0 }
          - { name: grype, version: v0.110.0 }
    env:
      SCAN_IMAGE: python:3.9-slim
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: venslabs/vens
          ref: main
          path: .vens-src

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: .vens-src/go.mod
          cache-dependency-path: .vens-src/go.sum

      - name: Build vens from main
        id: build
        shell: bash
        working-directory: .vens-src
        run: |
          set -euo pipefail
          bin="${RUNNER_TEMP}/vens"
          go build -o "${bin}" ./cmd/vens
          echo "bin=${bin}" >> "${GITHUB_OUTPUT}"

      - name: Install ${{ matrix.scanner.name }} ${{ matrix.scanner.version }}
        id: scanner
        shell: bash
        env:
          SCANNER_NAME: ${{ matrix.scanner.name }}
          SCANNER_VERSION: ${{ matrix.scanner.version }}
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/scanner-bin"
          mkdir -p "${bin_dir}"
          cd "${bin_dir}"
          ver="${SCANNER_VERSION#v}"
          case "${RUNNER_OS}" in
            Linux)  t_os=Linux;  g_os=linux ;;
            macOS)  t_os=macOS;  g_os=darwin ;;
          esac
          case "${RUNNER_ARCH}" in
            X64)    t_arch=64bit; g_arch=amd64 ;;
            ARM64)  t_arch=ARM64; g_arch=arm64 ;;
          esac
          case "${SCANNER_NAME}" in
            trivy)
              tarball="trivy_${ver}_${t_os}-${t_arch}.tar.gz"
              checksums="trivy_${ver}_checksums.txt"
              base="https://github.com/aquasecurity/trivy/releases/download/${SCANNER_VERSION}"
              ;;
            grype)
              tarball="grype_${ver}_${g_os}_${g_arch}.tar.gz"
              checksums="grype_${ver}_checksums.txt"
              base="https://github.com/anchore/grype/releases/download/${SCANNER_VERSION}"
              ;;
          esac
          curl -fsSL --proto '=https' --tlsv1.2 -o "${tarball}" "${base}/${tarball}"
          curl -fsSL --proto '=https' --tlsv1.2 -o checksums.txt "${base}/${checksums}"
          grep -F "${tarball}" checksums.txt | shasum -a 256 -c -
          tar -xzf "${tarball}" "${SCANNER_NAME}"
          chmod +x "${SCANNER_NAME}"
          echo "bin=${bin_dir}/${SCANNER_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Scan ${{ env.SCAN_IMAGE }}
        id: scan
        shell: bash
        env:
          SCANNER_NAME: ${{ matrix.scanner.name }}
          SCANNER_BIN: ${{ steps.scanner.outputs.bin }}
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/scan.json"
          case "${SCANNER_NAME}" in
            trivy) "${SCANNER_BIN}" image --quiet --format json --output "${out}" "${SCAN_IMAGE}" ;;
            grype) "${SCANNER_BIN}" "${SCAN_IMAGE}" -o json > "${out}" ;;
          esac
          test -s "${out}"
          echo "report=${out}" >> "${GITHUB_OUTPUT}"

      - name: Run vens action
        id: vens
        uses: ./
        with:
          bin-path: ${{ steps.build.outputs.bin }}
          config-file: testdata/config.yaml
          input-report: ${{ steps.scan.outputs.report }}
          input-format: ${{ matrix.scanner.name }}
          output-vex: ${{ runner.temp }}/vex.cdx.json
          sbom-serial-number: urn:uuid:3e671687-395b-41f5-a30f-a58921a69b79
          llm-provider: mock
          enrich: ${{ matrix.scanner.name == 'trivy' }}
          output-enriched-report: ${{ runner.temp }}/enriched.json

      - name: Assert VEX shape
        shell: bash
        env:
          VEX_FILE: ${{ steps.vens.outputs.vex-file }}
        run: |
          set -euo pipefail
          jq -e '.bomFormat == "CycloneDX"' "${VEX_FILE}"
          jq -e '.vulnerabilities | length > 0' "${VEX_FILE}"
          jq -e '[.vulnerabilities[] | select(.ratings[]?.method == "OWASP")] | length > 0' "${VEX_FILE}"

      - name: Assert enriched report
        if: matrix.scanner.name == 'trivy'
        shell: bash
        env:
          ENRICHED: ${{ steps.vens.outputs.enriched-report }}
        run: |
          set -euo pipefail
          jq -e '[.Results[]?.Vulnerabilities[]? | select(.Custom.owasp_score != null)] | length > 0' "${ENRICHED}"
