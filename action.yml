name: vens
description: Prioritize vulnerabilities by real risk, not just CVSS
author: fahedouch
branding:
  icon: shield
  color: purple

inputs:
  version:
    description: "vens release tag to install (e.g. v0.3.1). Ignored when bin-path is set."
    default: ""
  bin-path:
    description: "Path to a pre-installed vens binary. Skips download. Use for air-gapped runners and custom builds."
    default: ""
  config-file:
    description: "Path to config.yaml describing project context"
    required: true
  input-report:
    description: "Path to the Trivy or Grype JSON scan report"
    required: true
  input-format:
    description: "Scanner format: auto | trivy | grype"
    default: auto
  output-vex:
    description: "Output path for the generated CycloneDX VEX file"
    default: ${{ runner.temp }}/vens-vex.cdx.json
  sbom-serial-number:
    description: "SBOM BOM-Link serial in urn:uuid:<uuid> form. Pin one per service and reuse it across runs."
    required: true
  sbom-version:
    description: "BOM-Link version integer"
    default: "1"
  llm-provider:
    description: "openai | anthropic | googleai | ollama | mock"
    default: openai
  llm-model:
    description: "Model name (mapped to <PROVIDER>_MODEL)"
    default: ""
  llm-api-key:
    description: "API key for the selected provider. Masked in logs."
    default: ""
  llm-base-url:
    description: "Custom base URL (OpenAI-compatible endpoint or Ollama host)"
    default: ""
  llm-batch-size:
    description: "CVEs per LLM request"
    default: "10"
  enrich:
    description: "If true, also produce an enriched Trivy report"
    default: "false"
  output-enriched-report:
    description: "Output path for the enriched report (when enrich=true)"
    default: ${{ runner.temp }}/vens-enriched.json
  fail-on-severity:
    description: "Gate the build: fail the step when the VEX contains at least one CVE scored at or above this OWASP level (critical | high | medium | low | info). Leave empty to never fail."
    default: ""

outputs:
  vex-file:
    description: "Path to the generated CycloneDX VEX file"
    value: ${{ steps.run.outputs.vex-file }}
  enriched-report:
    description: "Path to the enriched Trivy report (empty when enrich=false)"
    value: ${{ steps.run.outputs.enriched-report }}
  version:
    description: "vens version that was installed (empty when bin-path is used)"
    value: ${{ inputs.version }}
  sbom-serial-number:
    description: "SBOM serial number that was used"
    value: ${{ inputs.sbom-serial-number }}
  count-critical:
    description: "Number of CVEs the VEX rated CRITICAL by OWASP (score >= 60)"
    value: ${{ steps.run.outputs.count-critical }}
  count-high:
    description: "Number of CVEs the VEX rated HIGH (score >= 40)"
    value: ${{ steps.run.outputs.count-high }}
  count-medium:
    description: "Number of CVEs the VEX rated MEDIUM (score >= 20)"
    value: ${{ steps.run.outputs.count-medium }}
  count-low:
    description: "Number of CVEs the VEX rated LOW (score >= 5)"
    value: ${{ steps.run.outputs.count-low }}
  count-info:
    description: "Number of CVEs the VEX rated INFO (score < 5)"
    value: ${{ steps.run.outputs.count-info }}

runs:
  using: composite
  steps:
    - name: Install vens
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BIN_PATH: ${{ inputs.bin-path }}
      run: |
        set -euo pipefail

        _safe() { printf '%s' "${1-}" | tr '\n\r' '  '; }

        if [ -n "${BIN_PATH}" ]; then
          if [ ! -x "${BIN_PATH}" ]; then
            echo "::error::bin-path is not an executable: $(_safe "${BIN_PATH}")"
            exit 1
          fi
          bin_dir=$(cd "$(dirname "${BIN_PATH}")" && pwd)
          echo "${bin_dir}" >> "${GITHUB_PATH}"
          "${BIN_PATH}" --version
          exit 0
        fi

        if [ -z "${VERSION}" ]; then
          echo "::error::one of 'version' or 'bin-path' must be set"
          exit 1
        fi

        case "${RUNNER_OS}" in
          Linux)  os=linux ;;
          macOS)  os=darwin ;;
          *) echo "::error::unsupported runner OS: ${RUNNER_OS} (Linux or macOS only)"; exit 1 ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::unsupported runner arch: ${RUNNER_ARCH}"; exit 1 ;;
        esac

        if ! printf '%s' "${VERSION}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
          echo "::error::version must be a semver tag like v0.1.0 (got: $(_safe "${VERSION}"))"
          exit 1
        fi

        dir="${RUNNER_TEMP}/vens-${VERSION}"
        mkdir -p "${dir}"
        cd "${dir}"

        tarball="vens-${VERSION}-${os}-${arch}.tar.gz"
        base="https://github.com/venslabs/vens/releases/download/${VERSION}"

        curl -fsSL --proto '=https' --tlsv1.2 -o "${tarball}" "${base}/${tarball}"
        curl -fsSL --proto '=https' --tlsv1.2 -o SHA256SUMS "${base}/SHA256SUMS"
        grep -F "  ${tarball}" SHA256SUMS | shasum -a 256 -c -

        tar -xzf "${tarball}"
        chmod +x ./vens
        rm -f "${tarball}" SHA256SUMS
        echo "${dir}" >> "${GITHUB_PATH}"
        ./vens --version

    - name: Run vens
      id: run
      shell: bash
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_REPORT: ${{ inputs.input-report }}
        INPUT_FORMAT: ${{ inputs.input-format }}
        INPUT_OUTPUT_VEX: ${{ inputs.output-vex }}
        INPUT_SBOM_SERIAL: ${{ inputs.sbom-serial-number }}
        INPUT_SBOM_VERSION: ${{ inputs.sbom-version }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm-provider }}
        INPUT_LLM_BATCH_SIZE: ${{ inputs.llm-batch-size }}
        INPUT_ENRICH: ${{ inputs.enrich }}
        INPUT_ENRICHED_OUT: ${{ inputs.output-enriched-report }}
        INPUT_LLM_API_KEY: ${{ inputs.llm-api-key }}
        INPUT_LLM_MODEL: ${{ inputs.llm-model }}
        INPUT_LLM_BASE_URL: ${{ inputs.llm-base-url }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: |
        set -euo pipefail

        _safe() { printf '%s' "${1-}" | tr '\n\r' '  '; }

        command -v jq >/dev/null 2>&1 || { echo "::error::jq is required on the runner but was not found on PATH"; exit 1; }

        if [ -n "${INPUT_LLM_API_KEY}" ]; then
          echo "::add-mask::$(printf '%s' "${INPUT_LLM_API_KEY}" | tr -d '\n\r')"
        fi

        case "${INPUT_LLM_PROVIDER}" in
          openai)
            export OPENAI_API_KEY="${INPUT_LLM_API_KEY}"
            export OPENAI_MODEL="${INPUT_LLM_MODEL}"
            export OPENAI_BASE_URL="${INPUT_LLM_BASE_URL}"
            ;;
          anthropic)
            export ANTHROPIC_API_KEY="${INPUT_LLM_API_KEY}"
            export ANTHROPIC_MODEL="${INPUT_LLM_MODEL}"
            ;;
          googleai)
            export GOOGLE_API_KEY="${INPUT_LLM_API_KEY}"
            export GOOGLE_MODEL="${INPUT_LLM_MODEL}"
            ;;
          ollama)
            export OLLAMA_MODEL="${INPUT_LLM_MODEL}"
            export OLLAMA_HOST="${INPUT_LLM_BASE_URL}"
            ;;
          mock)
            ;;
          *)
            echo "::error::unknown llm-provider: $(_safe "${INPUT_LLM_PROVIDER}")"
            exit 1
            ;;
        esac

        vens generate \
          --config-file "${INPUT_CONFIG_FILE}" \
          --llm "${INPUT_LLM_PROVIDER}" \
          --llm-batch-size "${INPUT_LLM_BATCH_SIZE}" \
          --input-format "${INPUT_FORMAT}" \
          --sbom-serial-number "${INPUT_SBOM_SERIAL}" \
          --sbom-version "${INPUT_SBOM_VERSION}" \
          "${INPUT_REPORT}" "${INPUT_OUTPUT_VEX}"

        echo "vex-file=${INPUT_OUTPUT_VEX}" >> "${GITHUB_OUTPUT}"

        if [ "${INPUT_ENRICH}" = "true" ]; then
          vens enrich --vex "${INPUT_OUTPUT_VEX}" --output "${INPUT_ENRICHED_OUT}" "${INPUT_REPORT}"
          echo "enriched-report=${INPUT_ENRICHED_OUT}" >> "${GITHUB_OUTPUT}"
        else
          echo "enriched-report=" >> "${GITHUB_OUTPUT}"
        fi

        if ! counts=$(jq -e '
          [.vulnerabilities[]?.ratings[]? | select(.method == "OWASP") | .severity]
          | { critical: map(select(. == "critical")) | length,
              high:     map(select(. == "high"))     | length,
              medium:   map(select(. == "medium"))   | length,
              low:      map(select(. == "low"))      | length,
              info:     map(select(. == "info"))     | length }
        ' "${INPUT_OUTPUT_VEX}" 2>&1); then
          echo "::error::failed to parse OWASP ratings from ${INPUT_OUTPUT_VEX} — vens may have produced a malformed VEX"
          exit 1
        fi
        crit=$(jq -r .critical <<<"${counts}")
        high=$(jq -r .high     <<<"${counts}")
        med=$(jq  -r .medium   <<<"${counts}")
        low=$(jq  -r .low      <<<"${counts}")
        info=$(jq -r .info     <<<"${counts}")
        total=$(( crit + high + med + low + info ))
        {
          echo "count-critical=${crit}"
          echo "count-high=${high}"
          echo "count-medium=${med}"
          echo "count-low=${low}"
          echo "count-info=${info}"
        } >> "${GITHUB_OUTPUT}"
        echo "OWASP counts: critical=${crit} high=${high} medium=${med} low=${low} info=${info} (total=${total})"

        if [ -n "${INPUT_FAIL_ON_SEVERITY}" ]; then
          case "${INPUT_FAIL_ON_SEVERITY}" in
            critical) over=${crit} ;;
            high)     over=$(( crit + high )) ;;
            medium)   over=$(( crit + high + med )) ;;
            low)      over=$(( crit + high + med + low )) ;;
            info)     over=${total} ;;
            *) echo "::error::fail-on-severity must be one of: critical, high, medium, low, info (got: $(_safe "${INPUT_FAIL_ON_SEVERITY}"))"; exit 1 ;;
          esac
          if [ "${total}" -eq 0 ]; then
            echo "::error::fail-on-severity is set but the VEX has no OWASP ratings — refusing to evaluate a silent gate. Check the vens run logs."
            exit 1
          fi
          if [ "${over}" -gt 0 ]; then
            echo "::error::${over} vulnerability(ies) at or above severity '${INPUT_FAIL_ON_SEVERITY}'"
            exit 1
          fi
        fi
